name: Daily morning alert

on:
  schedule:
    # GitHub Actions cron is UTC-only. Melbourne is UTC+11 during AEDT and
    # UTC+10 during AEST, so we schedule both and gate inside the script
    # using zoneinfo - only the one that aligns to 07:00 local actually runs.
    - cron: '0 20 * * *'   # 07:00 AEDT (Oct-Apr)
    - cron: '0 21 * * *'   # 07:00 AEST (Apr-Oct)
  workflow_dispatch:
    inputs:
      force:
        description: 'Run even if local Melbourne hour is not 7'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: pip install -r requirements.txt

      - run: npm install --no-save web-push@^3.6.7

      - name: Generate briefing
        id: brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_WEATHER_API_KEY: ${{ secrets.GOOGLE_WEATHER_API_KEY }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force && '1' || '0' }}
        run: python scripts/daily_alert.py

      - name: Send web push to PWA
        if: steps.brief.outputs.did_run == 'true'
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
        run: node scripts/send_push.js

      - name: Commit briefing.json back to main
        if: steps.brief.outputs.did_run == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/briefing.json
          if git diff --staged --quiet; then
            echo "No changes to briefing.json"
          else
            git commit -m 'chore: update briefing [skip ci]'
            git push
          fi
